name: OpenClaw Docker Patch

on:
  workflow_run:
    workflows: ["OpenClaw Sync"]
    types:
      - completed

jobs:
  docker_patch:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout fork (main)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0
          ref: main

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Patch Dockerfile
        run: |
          if [ ! -f "Dockerfile" ]; then
            echo "::error::Dockerfile이 존재하지 않습니다."
            exit 1
          fi
          grep -q 'OPENCLAW_DOCKER_APT_PACKAGES' Dockerfile || echo "::warning::OPENCLAW_DOCKER_APT_PACKAGES ARG 없음"
          grep -q 'OPENCLAW_INSTALL_BROWSER' Dockerfile || echo "::warning::OPENCLAW_INSTALL_BROWSER ARG 없음"

          # jq apt 설치
          sed -i 's/ARG OPENCLAW_DOCKER_APT_PACKAGES=""/ARG OPENCLAW_DOCKER_APT_PACKAGES="jq"/g' Dockerfile
          sed -i 's/ARG OPENCLAW_INSTALL_BROWSER=""/ARG OPENCLAW_INSTALL_BROWSER="1"/g' Dockerfile

          # pup은 apt에 없으므로 GitHub 릴리즈 바이너리로 설치하는 RUN 스텝 삽입
          if ! grep -q 'pup_v0.4.0' Dockerfile; then
            awk 'done==0 && /ARG OPENCLAW_INSTALL_BROWSER/{print; print "RUN apt-get update && apt-get install -y --no-install-recommends unzip && ARCH=$(dpkg --print-architecture) && curl -fsSL https://github.com/ericchiang/pup/releases/download/v0.4.0/pup_v0.4.0_linux_${ARCH}.zip -o /tmp/pup.zip && unzip -q /tmp/pup.zip pup -d /usr/local/bin && chmod +x /usr/local/bin/pup && rm /tmp/pup.zip && apt-get remove -y unzip && apt-get autoremove -y && rm -rf /var/lib/apt/lists/*"; done=1; next}1' Dockerfile > Dockerfile.tmp && mv Dockerfile.tmp Dockerfile
          fi

      - name: Commit and Push changes
        run: |
          git add Dockerfile
          git diff --staged --quiet || git commit -m "chore: auto-patch Dockerfile (jq, pup, browser)"
          git push origin main
