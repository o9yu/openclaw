name: OpenClaw Sync

on:
  schedule:
    - cron: '0 0 * * *' # 매일 오전 9시(KST)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork (main)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0
          ref: main

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/openclaw/openclaw.git || true
          git remote set-url upstream https://github.com/openclaw/openclaw.git

      - name: Fetch upstream
        run: |
          git fetch upstream main

      - name: Merge upstream into main
        run: |
          git checkout main
          git merge --no-edit upstream/main

      - name: Push to origin
        run: |
          git push origin main
