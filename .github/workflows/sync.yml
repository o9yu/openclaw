name: Sync fork with upstream (OpenClaw)

on:
  schedule:
    - cron: '0 0 * * *' # 매일 오전 9시(KST) 자동 실행 (UTC 00:00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork (main)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/openclaw/openclaw.git || true
          git remote set-url upstream https://github.com/openclaw/openclaw.git
          git remote -v

      - name: Fetch upstream
        run: |
          git fetch upstream main

      - name: Fast-forward main
        run: |
          git checkout main
          git merge --ff-only upstream/main

      - name: Push to origin
        run: |
          git push origin main
